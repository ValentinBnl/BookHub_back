services:
  sqlserver-dev:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookhub-sqlserver-dev
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DEV_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-dev-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DEV_SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver-prod:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookhub-sqlserver-prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${PROD_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-prod-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${PROD_SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver-dev-data:
  sqlserver-prod-data:
